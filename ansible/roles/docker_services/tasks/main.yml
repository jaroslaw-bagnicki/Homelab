---
- name: Validate inventory_hostname is in supported set
  ansible.builtin.assert:
    that:
      - inventory_hostname in ['homelab', 'cloudlab']
    fail_msg: "inventory_hostname '{{ inventory_hostname }}' is not in the supported set {homelab, cloudlab}. Update the assertion in tasks/main.yml."

- name: Ensure Docker service directory exists
  ansible.builtin.file:
    path: "{{ docker_dir }}"
    state: directory
    mode: "0755"

- name: Set cloudflared tunnel token from Key Vault
  vars:
    vault_url: "https://{{ arc_keyvault_name }}.vault.azure.net"
  ansible.builtin.set_fact:
    cloudflared_tunnel_token: "{{ lookup('azure.azcollection.azure_keyvault_secret', cloudflared_token_secret_name, vault_url=vault_url) }}"
  delegate_to: localhost
  no_log: true

- name: Template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ docker_dir }}/docker-compose.yml"
    mode: "0644"
  notify: Redeploy docker services

- name: Template Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ docker_dir }}/Caddyfile"
    mode: "0644"
  notify: Restart Caddy

- name: Write cloudflared .env file
  ansible.builtin.copy:
    content: "TUNNEL_TOKEN={{ cloudflared_tunnel_token }}\n"
    dest: "{{ docker_dir }}/.env"
    mode: "0600"
  no_log: true
  notify: Restart cloudflared

- name: Ensure .env is excluded from any future git init
  ansible.builtin.lineinfile:
    path: "{{ docker_dir }}/.gitignore"
    line: ".env"
    create: true
    state: present
    mode: "0600"

- name: Deploy docker services
  community.docker.docker_compose_v2:
    project_src: "{{ docker_dir }}"
    state: present
    pull: always

- name: Restart Portainer to clear security timeout
  community.docker.docker_container:
    name: portainer
    state: started
    restart: true

- name: Set Portainer admin password from Key Vault
  vars:
    vault_url: "https://{{ arc_keyvault_name }}.vault.azure.net"
  ansible.builtin.set_fact:
    portainer_admin_password: "{{ lookup('azure.azcollection.azure_keyvault_secret', portainer_admin_password_secret_name, vault_url=vault_url) }}"
  delegate_to: localhost
  no_log: true

- name: Wait for Portainer to listen on port 9000
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 9000
    delay: 3
    timeout: 30
  changed_when: false

- name: Init Portainer admin user  # noqa command-instead-of-module
  ansible.builtin.shell:
    cmd: >
      curl -sf -X POST http://127.0.0.1:9000/api/users/admin/init
      -H 'Content-Type: application/json'
      -d '{"Username":"admin","Password":"{{ portainer_admin_password }}"}'
  register: portainer_init
  changed_when: portainer_init.rc == 0
  failed_when: portainer_init.rc != 0 and portainer_init.rc != 22
  no_log: true
