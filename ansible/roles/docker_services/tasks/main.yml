---
- name: Validate inventory_hostname is in supported set
  ansible.builtin.assert:
    that:
      - inventory_hostname in ['homelab', 'cloudlab']
    fail_msg: "inventory_hostname '{{ inventory_hostname }}' is not in the supported set {homelab, cloudlab}. Update the assertion in tasks/main.yml."

- name: Ensure Docker service directory exists
  ansible.builtin.file:
    path: "{{ docker_dir }}"
    state: directory
    mode: "0755"

- name: Set cloudflared secret facts from Key Vault
  vars:
    vault_url: "https://{{ arc_keyvault_name }}.vault.azure.net"
  ansible.builtin.set_fact:
    cloudflared_tunnel_token: "{{ lookup('azure.azcollection.azure_keyvault_secret', cloudflared_token_secret_name, vault_url=vault_url) }}"
    cloudflared_origin_cert: "{{ lookup('azure.azcollection.azure_keyvault_secret', cloudflared_origin_cert_secret_name, vault_url=vault_url) }}"
    cloudflared_origin_key: "{{ lookup('azure.azcollection.azure_keyvault_secret', cloudflared_origin_key_secret_name, vault_url=vault_url) }}"
  delegate_to: localhost
  no_log: true

- name: Ensure certs directory exists in {{ docker_dir }}
  ansible.builtin.file:
    path: "{{ docker_dir }}/certs"
    state: directory
    mode: "0755"

- name: Template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ docker_dir }}/docker-compose.yml"
    mode: "0644"
  notify: Redeploy docker services

- name: Template Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ docker_dir }}/Caddyfile"
    mode: "0644"
  notify: Restart Caddy

- name: Write cloudflared .env file
  ansible.builtin.copy:
    content: "TUNNEL_TOKEN={{ cloudflared_tunnel_token }}\n"
    dest: "{{ docker_dir }}/.env"
    mode: "0600"
  no_log: true

- name: Write Cloudflare Origin Certificate
  ansible.builtin.copy:
    content: "{{ cloudflared_origin_cert }}\n"
    dest: "{{ docker_dir }}/certs/origin.pem"
    mode: "0644"
  no_log: true

- name: Write Cloudflare Origin Certificate key
  ansible.builtin.copy:
    content: "{{ cloudflared_origin_key }}\n"
    dest: "{{ docker_dir }}/certs/origin.key"
    mode: "0600"
  no_log: true

- name: Ensure secrets are excluded from any future git init
  ansible.builtin.lineinfile:
    path: "{{ docker_dir }}/.gitignore"
    line: "{{ item }}"
    create: true
    state: present
    mode: "0600"
  loop:
    - ".env"
    - "certs/"

- name: Deploy docker services
  community.docker.docker_compose_v2:
    project_src: "{{ docker_dir }}"
    state: present
    pull: always
