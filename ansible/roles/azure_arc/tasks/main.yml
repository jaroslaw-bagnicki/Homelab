---
- name: Install azcmagent dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: yes

- name: Add Microsoft package repo
  ansible.builtin.apt:
    deb: https://packages.microsoft.com/config/ubuntu/22.04/packages-microsoft-prod.deb

- name: Install azcmagent
  ansible.builtin.apt:
    name: azcmagent
    state: present
    update_cache: yes

- name: Fetch SPN client secret from Key Vault
  ansible.builtin.set_fact:
    arc_spn_secret: "{{ lookup('azure.azcollection.azure_keyvault_secret', arc_spn_secret_name, vault_url='https://' ~ arc_keyvault_name ~ '.vault.azure.net') }}"
  no_log: true

- name: Connect to Azure Arc
  ansible.builtin.shell: |
    sudo azcmagent connect \
      --tenant-id {{ arc_tenant_id }} \
      --subscription-id {{ arc_subscription_id }} \
      --location {{ arc_location }} \
      --resource-group {{ arc_resource_group }} \
      --service-principal-id {{ arc_spn_id }} \
      --service-principal-secret "{{ arc_spn_secret }}" \
      --resource-name {{ arc_machine_name }}
  args:
    executable: /bin/bash
  register: arc_connect_result
  changed_when: "'Already connected' not in arc_connect_result.stdout"

- name: Verify Arc connection
  ansible.builtin.command: sudo azcmagent show --json
  register: arc_show
  changed_when: false

- name: Display connection status
  ansible.builtin.debug:
    var: arc_show.stdout | from_json
