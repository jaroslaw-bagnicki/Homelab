---
- name: Validate inventory_hostname is in supported set
  ansible.builtin.assert:
    that:
      - inventory_hostname in ['homelab', 'cloudlab']
    fail_msg: "inventory_hostname '{{ inventory_hostname }}' is not in the supported set {homelab, cloudlab}. Update the assertion in tasks/main.yml."

- name: Ensure opencode ingress directory exists
  ansible.builtin.file:
    path: "{{ opencode_ingress_dir }}"
    state: directory
    mode: "0755"

- name: Ensure opencode_net Docker network exists
  community.docker.docker_network:
    name: "{{ opencode_network_name }}"
    state: present
    driver: bridge

- name: Template opencode ingress Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ opencode_ingress_dir }}/Caddyfile"
    mode: "0644"
  notify: Restart caddy-opencode

- name: Template opencode ingress docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ opencode_ingress_dir }}/docker-compose.yml"
    mode: "0644"
  notify: Redeploy opencode ingress

- name: Deploy opencode ingress
  community.docker.docker_compose_v2:
    project_src: "{{ opencode_ingress_dir }}"
    state: present
    pull: "{{ opencode_ingress_pull | default(true) }}"
