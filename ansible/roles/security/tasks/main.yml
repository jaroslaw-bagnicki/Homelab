---
- name: UFW default deny incoming
  community.general.ufw:
    default: deny
    direction: in

- name: UFW allow SSH
  community.general.ufw:
    rule: allow
    port: "{{ security_ssh_port }}"
    proto: tcp

- name: UFW deny inbound TCP/80
  community.general.ufw:
    rule: deny
    direction: in
    proto: tcp
    to_port: "80"
    comment: "block direct HTTP — Cloudflare Tunnel is the only ingress path"
  when: security_ufw_deny_inbound_tcp_80 | bool

- name: UFW allow outbound UDP to Cloudflare Tunnel QUIC port
  community.general.ufw:
    rule: allow
    direction: out
    proto: udp
    to_port: "{{ security_cloudflared_quic_port }}"
    comment: "cloudflared QUIC to Cloudflare edge"
  when: security_cloudflared_outbound_enabled | bool

- name: Enable UFW
  community.general.ufw:
    state: enabled
  notify: Reload UFW

- name: Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
    update_cache: true

- name: Deploy fail2ban jail config
  ansible.builtin.template:
    src: fail2ban-jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: Restart fail2ban

- name: Ensure fail2ban is running
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true
