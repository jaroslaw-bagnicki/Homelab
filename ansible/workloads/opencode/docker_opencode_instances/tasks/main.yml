- name: Validate opencode_instances list is non-empty
  ansible.builtin.assert:
    that:
      - opencode_instances | length > 0
    fail_msg: "opencode_instances list is empty. Define at least one instance in host_vars/{{ inventory_hostname }}.yml."

- name: Provision each opencode instance
  ansible.builtin.include_tasks: provision_instance.yml
  loop: "{{ opencode_instances }}"
  loop_control:
    loop_var: instance
    label: "{{ instance.name }}"
